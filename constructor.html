<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONSTRUCTOR MAESTRO V3.2 | BÚNKER</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #0f0f12; 
            color: #fff; 
            margin: 0; 
            padding: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        /* Barra de Navegación */
        .nav { 
            background: #16161a; 
            padding: 12px 25px; 
            border-bottom: 1px solid #333; 
        }
        .nav a { 
            color: #4f46e5; 
            text-decoration: none; 
            font-size: 13px; 
            font-weight: 600; 
        }

        /* Área de Trabajo */
        .workspace { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            flex-grow: 1; 
            background: #000; 
        }

        /* Editor de Código (Izquierda) */
        textarea { 
            background: #16161a; 
            color: #10b981; 
            border: none; 
            border-right: 1px solid #333; 
            padding: 25px; 
            font-family: 'Consolas', monospace; 
            font-size: 14px; 
            line-height: 1.6; 
            outline: none; 
            resize: none; 
            width: 100%; 
            height: 100%; 
            box-sizing: border-box; 
        }

        /* Vista Previa (Derecha) */
        #preview-frame { 
            background: #fff; 
            height: 100%; 
            width: 100%; 
            border: none; 
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="nav">
        <a href="index.html">← VOLVER AL PANEL DE CONTROL</a>
    </div>

    <div class="workspace">
        <textarea id="htmlInput" spellcheck="false" 
            placeholder="Añade aquí tus bloques de texto e imágenes... Ej: <img src='logo.png'> <p>Nuevo texto</p>" 
            oninput="updatePreview()"></textarea>
        
        <iframe id="preview-frame"></iframe>
    </div>

    <script>
        function updatePreview() {
            const htmlCode = document.getElementById('htmlInput').value;
            const frame = document.getElementById('preview-frame');
            const frameDoc = frame.contentDocument || frame.contentWindow.document;

            frameDoc.open();
            // Inyectamos un CSS base interno para que las imágenes no se desborden en la vista previa
            frameDoc.write(`
                <style>
                    body { font-family: sans-serif; padding: 20px; margin: 0; }
                    img { max-width: 100%; height: auto; display: block; margin-bottom: 15px; }
                    p { margin-bottom: 15px; line-height: 1.5; }
                </style>
                ${htmlCode}
            `);
            frameDoc.close();
        }

        // Cargar vista previa al iniciar
        window.onload = updatePreview;
    </script>

</body>
</html>
