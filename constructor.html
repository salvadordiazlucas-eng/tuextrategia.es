<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CONSTRUCTOR MAESTRO V3.2</title>
    <style>
        body { font-family: sans-serif; background: #0f0f12; color: #fff; margin: 0; padding: 20px; }
        .nav { margin-bottom: 20px; }
        .nav a { color: #4f46e5; text-decoration: none; font-size: 14px; }
        .editor-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; height: 80vh; }
        textarea { width: 100%; background: #16161a; color: #10b981; border: 1px solid #333; padding: 15px; border-radius: 8px; font-family: monospace; resize: none; font-size: 13px; outline: none;}
        #preview { background: white; color: black; border-radius: 8px; padding: 30px; overflow-y: auto; }
        
        /* Esta línea asegura que las imágenes que pegues se adapten y no rompan el cuadro blanco */
        #preview img { max-width: 100%; height: auto; } 
    </style>
</head>
<body>
    <div class="nav"><a href="index.html">← Volver al Panel de Control</a></div>
    <h1>🛠️ Constructor de Bloques</h1>
    <div class="editor-container">
        <textarea id="htmlInput" placeholder="Pega aquí el código o texto para estructurar... Ej: <img src='tu-imagen.png'>" oninput="updatePreview()"></textarea>
        <div id="preview">
            <p style="color:#999; text-align:center; margin-top:100px;">La vista previa visual aparecerá aquí...</p>
        </div>
    </div>

    <script>
        function updatePreview() {
            const input = document.getElementById('htmlInput').value;
            // Sustituye los saltos de línea por <br> para que el texto normal también se visualice
            const formattedInput = input.replace(/\n/g, '<br>');
            document.getElementById('preview').innerHTML = formattedInput;
        }
        
        // Carga inicial por si acaso
        updatePreview();
    </script>
</body>
</html>
