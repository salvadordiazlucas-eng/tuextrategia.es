<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Constructor Maestro V3.8 | SEO & Copy-to-Clipboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --cobalto: #0072ff; --noche: #020617; --pizarra: #1e293b; --texto: #f8fafc; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; }
        body { font-family: 'Inter', sans-serif; background: var(--noche); color: var(--texto); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 520px; background: #0f172a; border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; padding: 20px; overflow-y: auto; }
        .preview { flex-grow: 1; background: #111; display: flex; flex-direction: column; position: relative; }
        
        /* Panel SEO */
        .seo-panel { background: rgba(0, 114, 255, 0.1); border: 1px solid var(--cobalto); padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 12px; }
        .seo-item { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .status-ok { color: var(--success); font-weight: bold; }
        .status-warn { color: var(--warning); font-weight: bold; }

        /* Área de Código con Botón Copiar */
        .code-container { position: relative; margin-top: 15px; display: none; }
        #githubOutput { background: #000; color: #00ff88; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 11px; border: 1px solid var(--success); max-height: 150px; overflow-y: auto; white-space: pre-wrap; margin: 0; }
        .btn-copy { position: absolute; top: 10px; right: 10px; background: var(--success); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 10px; font-weight: bold; z-index: 10; }

        .modulo-card { background: var(--pizarra); padding: 18px; border-radius: 12px; margin-bottom: 20px; border-left: 4px solid var(--cobalto); }
        .rich-editor { width: 100%; background: #0b1120; border: 1px solid #334155; color: white; padding: 10px; border-radius: 6px; margin-top: 8px; min-height: 70px; font-size: 14px; outline: none; }
        
        input { width: 100%; background: #0f172a; border: 1px solid #334155; color: white; padding: 10px; border-radius: 6px; margin-top: 5px; box-sizing: border-box; font-size: 12px; }
        .btn-main { background: var(--cobalto); color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        
        iframe { width: 100%; height: 100%; border: none; background: var(--noche); }
        .mobile-view { width: 375px; height: 667px; border: 10px solid #333; border-radius: 25px; margin: 20px auto; }
        .label-sm { font-size: 10px; color: var(--cobalto); font-weight: bold; text-transform: uppercase; display: block; margin-top: 10px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="margin:0 0 10px 0;">Constructor V3.8</h2>
    
    <div class="seo-panel">
        <div style="margin-bottom:10px; border-bottom:1px solid var(--cobalto); padding-bottom:5px;"><strong>AUDITORÍA ESTRATÉGICA SEO</strong></div>
        <div id="seoMetrics">Esperando contenido...</div>
    </div>

    <div id="importArea">
        <textarea id="rawInput" style="height: 40px; width:100%; background:#000; color:#fff; border:1px solid #334155; border-radius:6px; font-size:10px; padding:5px;" placeholder="Pega el código aquí..."></textarea>
        <button class="btn-main" style="background:#475569; padding:8px; font-size:11px;" onclick="importarHTML()">Analizar Estructura</button>
    </div>

    <div id="editorInputs" style="margin-top:20px;"></div>

    <button class="btn-main" style="background: var(--success);" onclick="generarCodigoGitHub()">1. Generar Código Web</button>
    
    <div class="code-container" id="codeWrapper">
        <button class="btn-copy" id="btnCopy" onclick="copiarAlPortapapeles()">COPIAR CÓDIGO</button>
        <pre id="githubOutput"></pre>
    </div>
</div>

<div class="preview">
    <div style="background: #1e293b; padding: 10px; display: flex; justify-content: center; gap: 15px;">
        <button onclick="setDevice('pc')" style="cursor:pointer; background:none; border:none; color:white;">💻 PC</button>
        <button onclick="setDevice('mobile')" style="cursor:pointer; background:none; border:none; color:white;">📱 Móvil</button>
    </div>
    <iframe id="vistaPrevia"></iframe>
</div>

<script>
    let modulos = [];
    const headBase = `<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"><style>:root{--primary:#0072ff;--bg:#020617;--card-bg:rgba(255,255,255,0.02);--accent:#00d4ff;--text-muted:#94a3b8;--border:rgba(255,255,255,0.08);--transition:all 0.5s cubic-bezier(0.16,1,0.3,1);}body{margin:0;font-family:'Inter',sans-serif;background:var(--bg);color:white;line-height:1.6;text-align:center;}section{padding:100px 20px;display:flex;flex-direction:column;align-items:center;border-bottom:1px solid var(--border);}.hero{background:radial-gradient(circle at center, #1e293b 0%, #020617 100%);min-height:90vh;justify-content:center;}.logo-img{width:100%;max-width:280px;filter:drop-shadow(0 0 20px rgba(0,114,255,0.2));margin-bottom:30px;}h1{font-size:clamp(32px, 8vw, 65px);margin:20px 0;letter-spacing:-3px;background:linear-gradient(to bottom, #fff, #94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1;}.sub{color:var(--text-muted);font-size:1.2rem;max-width:700px;margin:0 auto 30px auto;}.service-card{background:var(--card-bg);border:1px solid var(--border);border-radius:32px;padding:40px;max-width:950px;margin:20px auto;transition:var(--transition);text-align:left;}.cta-btn, .btn-small{display:inline-block;padding:20px 40px;background:var(--primary);color:white!important;text-decoration:none;font-weight:700;border-radius:16px;box-shadow:0 10px 35px rgba(0,114,255,0.3);text-transform:uppercase;letter-spacing:1px;}.price-amount{font-size:38px;font-weight:700;display:block;margin-bottom:10px;}.whatsapp-float{position:fixed;bottom:30px;right:30px;width:65px;z-index:1000;}@media(max-width:768px){section{padding:60px 20px;}}</style></head><body>`;

    function importarHTML() {
        const raw = document.getElementById('rawInput').value;
        const parser = new DOMParser();
        const doc = parser.parseFromString(raw, 'text/html');
        const sections = doc.querySelectorAll('section, .service-card');
        modulos = [];
        sections.forEach((s, i) => {
            const btn = s.querySelector('a.cta-btn, a.btn-small');
            modulos.push({
                tipo: s.classList.contains('hero') ? 'hero' : 'card',
                titulo: s.querySelector('h1, h2, h3')?.innerText || "",
                texto: s.querySelector('.sub, p, div:not(.service-footer)')?.innerHTML || "",
                imagen: s.querySelector('img')?.getAttribute('src') || "",
                precio: s.querySelector('.price-amount')?.innerText || "",
                btnText: btn?.innerText || "",
                btnLink: btn?.getAttribute('href') || "#"
            });
        });
        renderUI();
    }

    function renderUI() {
        const container = document.getElementById('editorInputs');
        container.innerHTML = '';
        modulos.forEach((m, i) => {
            const card = document.createElement('div');
            card.className = 'modulo-card';
            card.innerHTML = `
                <span class="label-sm">BLOQUE ${i+1} - ${m.tipo.toUpperCase()}</span>
                <input type="text" value="${m.titulo}" oninput="modulos[${i}].titulo=this.value; updateVp()">
                <div class="rich-editor" contenteditable="true" oninput="modulos[${i}].texto=this.innerHTML; updateVp()">${m.texto}</div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div><span class="label-sm">Imagen URL</span><input type="text" value="${m.imagen}" oninput="modulos[${i}].imagen=this.value; updateVp()"></div>
                    <div><span class="label-sm">Precio</span><input type="text" value="${m.precio}" oninput="modulos[${i}].precio=this.value; updateVp()"></div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div><span class="label-sm">Texto Botón</span><input type="text" value="${m.btnText}" oninput="modulos[${i}].btnText=this.value; updateVp()"></div>
                    <div><span class="label-sm">Destino</span><input type="text" value="${m.btnLink}" oninput="modulos[${i}].btnLink=this.value; updateVp()"></div>
                </div>
            `;
            container.appendChild(card);
        });
        updateVp();
    }

    function updateVp() {
        let bodyContent = '';
        let wordCount = 0;
        let imgAltStatus = true;

        modulos.forEach((m, i) => {
            const tag = i === 0 ? 'h1' : 'h2';
            wordCount += m.texto.replace(/<[^>]*>/g, '').split(' ').filter(w => w.length > 0).length;
            if(m.imagen && !m.titulo) imgAltStatus = false;

            if(m.tipo === 'hero') {
                bodyContent += `<section class="hero"><img src="${m.imagen}" class="logo-img" alt="${m.titulo}"><${tag}>${m.titulo}</${tag}><div class="sub">${m.texto}</div>${m.btnText ? `<a href="${m.btnLink}" class="cta-btn">${m.btnText}</a>` : ''}</section>`;
            } else {
                bodyContent += `<section><div class="service-card">${m.imagen ? `<img src="${m.imagen}" style="width:100%; border-radius:15px; margin-bottom:25px;" alt="${m.titulo}">` : ''}<h3>${m.titulo}</h3><div style="color:var(--text-muted); margin-bottom:25px;">${m.texto}</div><div style="display:flex; justify-content:space-between; align-items:center; border-top:1px solid var(--border); padding-top:25px;">${m.precio ? `<span class="price-amount">${m.precio}</span>` : ''}${m.btnText ? `<a href="${m.btnLink}" class="btn-small">${m.btnText}</a>` : ''}</div></div></section>`;
            }
        });

        bodyContent += `<a href="https://wa.me/34643344106" class="whatsapp-float"><img src="WhatsApp.png" style="width:100%"></a>`;
        const finalHTML = headBase + bodyContent + `</body></html>`;
        document.getElementById('vistaPrevia').srcdoc = finalHTML;

        // Actualizar SEO Panel
        document.getElementById('seoMetrics').innerHTML = `
            <div class="seo-item">Jerarquía H1/H2: <span class="${modulos.length > 0 ? 'status-ok' : 'status-warn'}">${modulos.length > 0 ? 'Correcta' : 'Faltante'}</span></div>
            <div class="seo-item">Palabras Clave: <span class="${wordCount > 250 ? 'status-ok' : 'status-warn'}">${wordCount} / 250</span></div>
            <div class="seo-item">Accesibilidad (Alt): <span class="${imgAltStatus ? 'status-ok' : 'status-warn'}">${imgAltStatus ? 'Excelente' : 'Revisar'}</span></div>
        `;
    }

    function generarCodigoGitHub() {
        const code = document.getElementById('vistaPrevia').srcdoc;
        document.getElementById('githubOutput').innerText = code;
        document.getElementById('codeWrapper').style.display = 'block';
    }

    function copiarAlPortapapeles() {
        const text = document.getElementById('githubOutput').innerText;
        navigator.clipboard.writeText(text).then(() => {
            const btn = document.getElementById('btnCopy');
            btn.innerText = '¡COPIADO!';
            btn.style.background = '#10b981';
            setTimeout(() => {
                btn.innerText = 'COPIAR CÓDIGO';
                btn.style.background = '#10b981';
            }, 2000);
        });
    }

    function setDevice(t) { document.getElementById('vistaPrevia').className = (t==='mobile') ? 'mobile-view' : ''; }
</script>
</body>
</html>
