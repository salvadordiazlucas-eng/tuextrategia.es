<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CONSTRUCTOR MAESTRO | BÚNKER</title>
    <style>
        /* MANTENEMOS TU DISEÑO ORIGINAL DE ALTO RENDIMIENTO */
        body { font-family: sans-serif; background: #0f0f12; color: #fff; margin: 0; padding: 20px; }
        .nav { margin-bottom: 20px; }
        .nav a { color: #4f46e5; text-decoration: none; font-size: 14px; font-weight: bold; }
        .editor-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; height: 85vh; }
        
        /* EDITOR VERDE ORIGINAL */
        textarea { 
            width: 100%; 
            background: #16161a; 
            color: #10b981; 
            border: 1px solid #333; 
            padding: 15px; 
            border-radius: 8px; 
            font-family: monospace; 
            resize: none; 
            font-size: 13px; 
            outline: none; 
        }

        /* VISTA PREVIA PROFESIONAL */
        #preview { 
            background: #020617; /* Color de fondo de tu web Puliendo Ideas */
            color: white; 
            border-radius: 8px; 
            overflow-y: auto; 
            border: 1px solid #333;
            position: relative;
        }

        /* IMPLEMENTACIÓN DE IMÁGENES: Garantiza que se vean sin romper nada */
        #preview img { 
            max-width: 100%; 
            height: auto; 
            display: block; 
        }
    </style>
</head>
<body>
    <div class="nav">
        <a href="index.html">← VOLVER AL PANEL DE CONTROL</a>
    </div>
    
    <div class="editor-container">
        <textarea id="htmlInput" placeholder="Pega aquí el código de Puliendo Ideas..." oninput="updatePreview()"></textarea>
        
        <div id="preview">
            <div id="renderArea"></div>
        </div>
    </div>

    <script>
        function updatePreview() {
            const input = document.getElementById('htmlInput').value;
            const renderArea = document.getElementById('renderArea');
            
            // Inyectamos el código directamente para ver el resultado real
            renderArea.innerHTML = input;
            
            // Ejecutamos scripts internos si los hubiera (como el de la flecha de scroll)
            const scripts = renderArea.querySelectorAll("script");
            scripts.forEach(oldScript => {
                const newScript = document.createElement("script");
                newScript.text = oldScript.text;
                oldScript.parentNode.replaceChild(newScript, oldScript);
            });
        }
        
        // Inicialización
        updatePreview();
    </script>
</body>
</html>
