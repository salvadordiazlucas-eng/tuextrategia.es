<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONSTRUCTOR MAESTRO</title>
    <style>
        :root { --cobalto: #0072ff; --noche: #0a0a0b; --pizarra: #16161a; --texto: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--noche); color: var(--texto); margin: 0; padding-top: 60px; }
        
        .navbar { position: fixed; top: 0; width: 100%; background: var(--pizarra); padding: 15px; border-bottom: 1px solid #333; display: flex; justify-content: center; gap: 30px; z-index: 100; }
        .navbar a { color: #888; text-decoration: none; font-size: 14px; font-weight: 600; }
        .navbar a.active { color: var(--cobalto); }

        .main-layout { display: flex; height: calc(100vh - 60px); }
        .editor { width: 40%; background: #000; padding: 20px; border-right: 1px solid #333; }
        .preview { width: 60%; background: white; color: black; padding: 30px; overflow-y: auto; }
        
        textarea { width: 100%; height: 90%; background: transparent; color: #10b981; border: none; font-family: 'Consolas', monospace; font-size: 14px; outline: none; }
        h2 { font-size: 14px; color: var(--cobalto); text-transform: uppercase; margin-top: 0; }
        img { max-width: 100%; height: auto; } /* Esto asegura que las imágenes se vean bien */
    </style>
</head>
<body>

<nav class="navbar">
    <a href="index.html">🏠 INICIO</a>
    <a href="constructor.html" class="active">🛠️ CONSTRUCTOR</a>
    <a href="diagnostico.html">📊 DIAGNÓSTICO</a>
</nav>

<div class="main-layout">
    <div class="editor">
        <h2>Editor de Bloques</h2>
        <textarea id="htmlInput" placeholder="Escribe HTML aquí... Ej: <img src='imagen.png'>" oninput="updatePreview()"></textarea>
    </div>
    <div class="preview" id="visualPreview">
        <p style="color:#999">La vista previa aparecerá aquí...</p>
    </div>
</div>

<script>
    function updatePreview() {
        const input = document.getElementById('htmlInput').value;
        document.getElementById('visualPreview').innerHTML = input;
    }
</script>

</body>
</html>
