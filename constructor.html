<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Constructor Búnker V4.2.1 | Gestión de Importación</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --cobalto: #0072ff; --noche: #020617; --pizarra: #1e293b; --texto: #f8fafc; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; }
        body { font-family: 'Inter', sans-serif; background: var(--noche); color: var(--texto); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 580px; background: #0f172a; border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; padding: 20px; overflow-y: auto; }
        .preview { flex-grow: 1; background: #111; display: flex; flex-direction: column; position: relative; }
        .import-box { background: #000; border: 1px solid var(--cobalto); padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .modulo-card { background: var(--pizarra); padding: 18px; border-radius: 12px; margin-bottom: 25px; border-left: 4px solid var(--cobalto); position: relative; }
        .controls-top { position: absolute; top: 12px; right: 12px; display: flex; gap: 6px; z-index: 10; }
        .btn-mini { background: #0f172a; border: 1px solid #334155; color: white; cursor: pointer; border-radius: 4px; padding: 3px 7px; font-size: 10px; }
        .rich-editor { width: 100%; background: #0b1120; border: 1px solid #334155; color: white; padding: 12px; border-radius: 6px; margin-top: 5px; min-height: 80px; outline: none; }
        input, textarea { width: 100%; background: #0f172a; border: 1px solid #334155; color: white; padding: 10px; border-radius: 6px; margin-top: 6px; box-sizing: border-box; }
        .btn-main { background: var(--cobalto); color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 12px; }
        .code-container { position: relative; margin-top: 20px; display: none; }
        #githubOutput { background: #000; color: #00ff88; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 11px; border: 1px solid var(--success); max-height: 200px; overflow-y: auto; white-space: pre-wrap; }
        iframe { width: 100%; height: 100%; border: none; background: var(--noche); }
        .mobile-view { width: 375px; height: 667px; border: 12px solid #333; border-radius: 30px; margin: 20px auto; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="margin:0 0 10px 0;">Búnker V4.2.1</h2>

    <div class="import-box">
        <span style="font-size:10px; color:var(--cobalto); font-weight:bold;">1. PEGA AQUÍ TU HTML ACTUAL PARA EDITAR:</span>
        <textarea id="rawInput" style="height: 60px; font-size:10px;" placeholder="Pega el código completo aquí..."></textarea>
        <button class="btn-main" style="background:#475569; padding:8px; font-size:11px;" onclick="importarHTML()">CARGAR PARA EDITAR</button>
    </div>
    
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
        <button class="btn-main" style="margin-top:0;" onclick="añadirSeccion('hero')">+ Nuevo Hero</button>
        <button class="btn-main" style="margin-top:0; background:var(--warning); color:black;" onclick="añadirSeccion('grid')">+ Nueva Cuadrícula</button>
    </div>

    <div id="editorInputs" style="margin-top:20px;"></div>

    <button class="btn-main" style="background: var(--success); font-size: 16px; padding: 18px;" onclick="generarCodigoGitHub()">2. GENERAR CÓDIGO FINAL</button>
    
    <div class="code-container" id="codeWrapper">
        <button class="btn-main" style="background:var(--success); margin-bottom:5px;" onclick="copiarAlPortapapeles()">¡COPIAR CÓDIGO LISTO!</button>
        <pre id="githubOutput"></pre>
    </div>
</div>

<div class="preview">
    <div style="background: #1e293b; padding: 10px; display: flex; justify-content: center; gap: 20px;">
        <button onclick="setDevice('pc')" style="color:white; background:none; border:none; cursor:pointer;">💻 PC</button>
        <button onclick="setDevice('mobile')" style="color:white; background:none; border:none; cursor:pointer;">📱 MÓVIL</button>
    </div>
    <iframe id="vistaPrevia"></iframe>
</div>

<script>
    let secciones = [];
    const headBase = `<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"><style>:root{--primary:#0072ff;--bg:#020617;--card-bg:rgba(255,255,255,0.02);--accent:#00d4ff;--text-muted:#94a3b8;--border:rgba(255,255,255,0.08);--transition:all 0.5s cubic-bezier(0.16,1,0.3,1);}body{margin:0;font-family:'Inter',sans-serif;background:var(--bg);color:white;line-height:1.6;text-align:center;}section{padding:100px 20px;display:flex;flex-direction:column;align-items:center;border-bottom:1px solid var(--border);}.hero{background:radial-gradient(circle at center, #1e293b 0%, #020617 100%);min-height:85vh;justify-content:center;}.logo-img{width:100%;max-width:280px;filter:drop-shadow(0 0 20px rgba(0,114,255,0.2));margin-bottom:30px;}h1{font-size:clamp(35px, 8vw, 65px);margin:20px 0;letter-spacing:-3px;background:linear-gradient(to bottom, #fff, #94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1;}h2{font-size:3rem;}.sub{color:var(--text-muted);font-size:1.3rem;max-width:750px;margin:0 auto 35px auto;}.cta-btn, .btn-small{display:inline-block;padding:20px 45px;background:var(--primary);color:white!important;text-decoration:none;font-weight:700;border-radius:18px;box-shadow:0 10px 35px rgba(0,114,255,0.3);text-transform:uppercase;letter-spacing:1px;}.bunker-grid-container{width:100%;max-width:1150px;margin-top:40px;display:grid;grid-template-columns:repeat(2,1fr);gap:35px;text-align:left;}.grid-card{background:var(--card-bg);border:1px solid var(--border);border-radius:32px;padding:40px;display:flex;flex-direction:column;gap:15px;}.whatsapp-float{position:fixed;bottom:30px;right:30px;width:65px;z-index:1000;}@media(max-width:991px){.bunker-grid-container{grid-template-columns:1fr;}}</style></head><body>`;

    function añadirSeccion(tipo) {
        if(tipo === 'hero') secciones.push({ tipo: 'hero', titulo: 'Título', texto: 'Descripción...', imagen: '', btnText: 'Botón', btnLink: '#', align: 'center' });
        else secciones.push({ tipo: 'grid', titulo: 'Servicios', tarjetas: [] });
        renderUI();
    }

    function importarHTML() {
        const raw = document.getElementById('rawInput').value;
        const parser = new DOMParser();
        const doc = parser.parseFromString(raw, 'text/html');
        const sections = doc.querySelectorAll('section');
        secciones = [];
        sections.forEach(s => {
            const isHero = s.classList.contains('hero');
            const isGrid = s.querySelector('.bunker-grid-container');
            if(isHero) {
                secciones.push({ tipo: 'hero', titulo: s.querySelector('h1')?.innerText || '', texto: s.querySelector('.sub')?.innerHTML || '', imagen: s.querySelector('img')?.src || '', btnText: s.querySelector('.cta-btn')?.innerText || '', btnLink: s.querySelector('.cta-btn')?.href || '', align: 'center' });
            } else if(isGrid) {
                let tarjetas = [];
                s.querySelectorAll('.grid-card').forEach(c => {
                    tarjetas.push({ titulo: c.querySelector('h3')?.innerText || '', texto: c.querySelector('p')?.innerText || '', imagen: c.querySelector('img')?.src || '' });
                });
                secciones.push({ tipo: 'grid', titulo: s.querySelector('h2')?.innerText || '', tarjetas: tarjetas });
            }
        });
        renderUI();
    }

    function renderUI() {
        const container = document.getElementById('editorInputs'); container.innerHTML = '';
        secciones.forEach((s, i) => {
            const div = document.createElement('div'); div.className = 'modulo-card';
            if(s.tipo === 'hero') {
                div.innerHTML = `<span class="label-sm">HERO</span><input type="text" value="${s.titulo}" oninput="secciones[${i}].titulo=this.value; updateVp()"><textarea class="rich-editor" oninput="secciones[${i}].texto=this.value; updateVp()">${s.texto}</textarea>`;
            } else {
                div.innerHTML = `<span class="label-sm">CUADRÍCULA</span><input type="text" value="${s.titulo}" oninput="secciones[${i}].titulo=this.value; updateVp()"><button class="btn-main" onclick="secciones[${i}].tarjetas.push({titulo:'',texto:'',imagen:''}); renderUI()">+ Añadir Tarjeta</button>`;
            }
            container.appendChild(div);
        });
        updateVp();
    }

    function updateVp() {
        let content = '';
        secciones.forEach(s => {
            if(s.tipo==='hero') content += `<section class="hero"><img src="${s.imagen}" class="logo-img"><h1>${s.titulo}</h1><div class="sub">${s.texto}</div><a href="${s.btnLink}" class="cta-btn">${s.btnText}</a></section>`;
            else {
                let grids = ''; s.tarjetas.forEach(t => grids += `<div class="grid-card"><h3>${t.titulo}</h3><p>${t.texto}</p></div>`);
                content += `<section><h2>${s.titulo}</h2><div class="bunker-grid-container">${grids}</div></section>`;
            }
        });
        document.getElementById('vistaPrevia').srcdoc = headBase + content + `</body></html>`;
    }

    function generarCodigoGitHub() { document.getElementById('githubOutput').innerText = document.getElementById('vistaPrevia').srcdoc; document.getElementById('codeWrapper').style.display='block'; }
    function copiarAlPortapapeles() { navigator.clipboard.writeText(document.getElementById('githubOutput').innerText); alert('Copiado al portapapeles'); }
    function setDevice(t) { document.getElementById('vistaPrevia').className = (t==='mobile') ? 'mobile-view' : ''; }
</script>
</body>
</html>
