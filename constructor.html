<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Constructor Maestro V3.7 | Gestión de Acciones y Botones</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --cobalto: #0072ff; --noche: #020617; --pizarra: #1e293b; --texto: #f8fafc; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; }
        body { font-family: 'Inter', sans-serif; background: var(--noche); color: var(--texto); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 520px; background: #0f172a; border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; padding: 20px; overflow-y: auto; }
        .preview { flex-grow: 1; background: #111; display: flex; flex-direction: column; position: relative; }
        
        .modulo-card { background: var(--pizarra); padding: 18px; border-radius: 12px; margin-bottom: 20px; border-left: 4px solid var(--cobalto); border-top: 1px solid rgba(255,255,255,0.05); }
        .rich-editor { width: 100%; background: #0b1120; border: 1px solid #334155; color: white; padding: 10px; border-radius: 6px; margin-top: 8px; min-height: 70px; font-size: 14px; outline: none; }
        
        input, select { width: 100%; background: #0f172a; border: 1px solid #334155; color: white; padding: 10px; border-radius: 6px; margin-top: 5px; box-sizing: border-box; font-size: 12px; }
        .field-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; border-top: 1px dashed rgba(255,255,255,0.1); padding-top: 10px; }
        .label-sm { font-size: 10px; color: var(--cobalto); font-weight: bold; text-transform: uppercase; margin-top: 8px; }

        .btn-main { background: var(--cobalto); color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; transition: 0.3s; }
        .btn-main:hover { filter: brightness(1.2); }
        
        #githubOutput { background: #000; color: #00ff88; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 11px; margin-top: 15px; display: none; border: 1px solid var(--success); max-height: 150px; overflow-y: auto; }
        
        iframe { width: 100%; height: 100%; border: none; background: var(--noche); }
        .mobile-view { width: 375px; height: 667px; border: 10px solid #333; border-radius: 25px; margin: 20px auto; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="margin:0 0 5px 0; font-size: 20px;">Constructor Maestro V3.7</h2>
    <p style="font-size: 12px; color: #94a3b8; margin-bottom: 20px;">Gestor Estratégico de Conversión</p>
    
    <div id="importArea">
        <textarea id="rawInput" style="height: 50px; width:100%; background:#000; color:#fff; border:1px solid #334155; border-radius:6px; font-size:10px; padding:8px;" placeholder="Pega el código de GitHub aquí..."></textarea>
        <button class="btn-main" style="background:#475569; padding:8px; font-size:11px;" onclick="importarHTML()">Analizar Estructura y Comportamientos</button>
    </div>

    <div id="editorInputs" style="margin-top:20px;"></div>

    <button class="btn-main" style="background: var(--success);" onclick="generarCodigoGitHub()">Generar Código para GitHub</button>
    <div id="githubOutput"></div>
</div>

<div class="preview">
    <div style="background: #1e293b; padding: 10px; display: flex; justify-content: center; gap: 15px;">
        <button onclick="setDevice('pc')" style="cursor:pointer; background:none; border:none; color:white;">💻 Desktop</button>
        <button onclick="setDevice('mobile')" style="cursor:pointer; background:none; border:none; color:white;">📱 Mobile</button>
    </div>
    <iframe id="vistaPrevia"></iframe>
</div>

<script>
    let modulos = [];
    
    // ADN de Estilo Búnker
    const headBase = `<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"><style>:root{--primary:#0072ff;--bg:#020617;--card-bg:rgba(255,255,255,0.02);--accent:#00d4ff;--text-muted:#94a3b8;--border:rgba(255,255,255,0.08);--transition:all 0.5s cubic-bezier(0.16,1,0.3,1);}body{margin:0;font-family:'Inter',sans-serif;background:var(--bg);color:white;line-height:1.6;text-align:center;}section{padding:100px 20px;display:flex;flex-direction:column;align-items:center;border-bottom:1px solid var(--border);}.hero{background:radial-gradient(circle at center, #1e293b 0%, #020617 100%);min-height:90vh;justify-content:center;}.logo-img{width:100%;max-width:280px;filter:drop-shadow(0 0 20px rgba(0,114,255,0.2));margin-bottom:30px;}h1{font-size:clamp(32px, 8vw, 65px);margin:20px 0;letter-spacing:-3px;background:linear-gradient(to bottom, #fff, #94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1;}.sub{color:var(--text-muted);font-size:1.2rem;max-width:700px;margin:0 auto 30px auto;}.service-card{background:var(--card-bg);border:1px solid var(--border);border-radius:32px;padding:40px;max-width:950px;margin:20px auto;transition:var(--transition);text-align:left;}.cta-btn, .btn-small{display:inline-block;padding:20px 40px;background:var(--primary);color:white!important;text-decoration:none;font-weight:700;border-radius:16px;box-shadow:0 10px 35px rgba(0,114,255,0.3);transition:0.3s;text-transform:uppercase;letter-spacing:1px;}.cta-btn:hover, .btn-small:hover{transform:translateY(-5px);box-shadow:0 15px 40px rgba(0,114,255,0.5);}.price-amount{font-size:38px;font-weight:700;display:block;margin-bottom:10px;}.whatsapp-float{position:fixed;bottom:30px;right:30px;width:65px;z-index:1000;}@media(max-width:768px){section{padding:60px 20px;}}</style></head><body>`;

    function importarHTML() {
        const raw = document.getElementById('rawInput').value;
        const parser = new DOMParser();
        const doc = parser.parseFromString(raw, 'text/html');
        
        const sections = doc.querySelectorAll('section, .service-card');
        modulos = [];
        
        sections.forEach((s, i) => {
            const btn = s.querySelector('a.cta-btn, a.btn-small');
            modulos.push({
                tipo: s.classList.contains('hero') ? 'hero' : 'card',
                titulo: s.querySelector('h1, h2, h3')?.innerText || "",
                texto: s.querySelector('.sub, p, div:not(.service-footer)')?.innerHTML || "",
                imagen: s.querySelector('img')?.getAttribute('src') || "",
                precio: s.querySelector('.price-amount')?.innerText || "",
                btnText: btn?.innerText || "SABER MÁS",
                btnLink: btn?.getAttribute('href') || "#",
                btnActive: btn ? true : false
            });
        });
        renderUI();
    }

    function renderUI() {
        const container = document.getElementById('editorInputs');
        container.innerHTML = '';
        modulos.forEach((m, i) => {
            const card = document.createElement('div');
            card.className = 'modulo-card';
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between;">
                    <span class="label-sm">BLOQUE ${i+1} - ${m.tipo.toUpperCase()}</span>
                    <label style="font-size:10px;"><input type="checkbox" ${m.btnActive?'checked':''} onchange="modulos[${i}].btnActive=this.checked; updateVp()"> Activar Botón</label>
                </div>
                <input type="text" value="${m.titulo}" placeholder="Título Principal" oninput="modulos[${i}].titulo=this.value; updateVp()">
                <div class="rich-editor" contenteditable="true" oninput="modulos[${i}].texto=this.innerHTML; updateVp()">${m.texto}</div>
                
                <div class="field-group">
                    <div><span class="label-sm">Imagen (URL)</span><input type="text" value="${m.imagen}" oninput="modulos[${i}].imagen=this.value; updateVp()"></div>
                    <div><span class="label-sm">Precio (Opcional)</span><input type="text" value="${m.precio}" oninput="modulos[${i}].precio=this.value; updateVp()"></div>
                </div>

                ${m.btnActive ? `
                <div class="field-group" style="background:rgba(0,114,255,0.05); padding:10px; border-radius:8px;">
                    <div><span class="label-sm">Texto del Botón</span><input type="text" value="${m.btnText}" oninput="modulos[${i}].btnText=this.value; updateVp()"></div>
                    <div><span class="label-sm">Destino (URL / #ID)</span><input type="text" value="${m.btnLink}" oninput="modulos[${i}].btnLink=this.value; updateVp()"></div>
                </div>
                ` : ''}
            `;
            container.appendChild(card);
        });
        updateVp();
    }

    function updateVp() {
        let bodyContent = '';
        modulos.forEach((m, i) => {
            const tag = i === 0 ? 'h1' : 'h2';
            if(m.tipo === 'hero') {
                bodyContent += `
                <section class="hero">
                    <img src="${m.imagen}" class="logo-img">
                    <${tag}>${m.titulo}</${tag}>
                    <div class="sub">${m.texto}</div>
                    ${m.btnActive ? `<a href="${m.btnLink}" class="cta-btn">${m.btnText}</a>` : ''}
                </section>`;
            } else {
                bodyContent += `
                <section>
                    <div class="service-card">
                        ${m.imagen ? `<img src="${m.imagen}" style="width:100%; border-radius:15px; margin-bottom:25px;">` : ''}
                        <h3>${m.titulo}</h3>
                        <div style="color:var(--text-muted); margin-bottom:25px; font-size:1.1rem;">${m.texto}</div>
                        <div style="display:flex; justify-content:space-between; align-items:center; border-top:1px solid var(--border); padding-top:25px;">
                            ${m.precio ? `<span class="price-amount">${m.precio}</span>` : ''}
                            ${m.btnActive ? `<a href="${m.btnLink}" class="btn-small">${m.btnText}</a>` : ''}
                        </div>
                    </div>
                </section>`;
            }
        });

        bodyContent += `<a href="https://wa.me/34643344106" class="whatsapp-float"><img src="WhatsApp.png" style="width:100%"></a>`;
        const finalHTML = headBase + bodyContent + `</body></html>`;
        document.getElementById('vistaPrevia').srcdoc = finalHTML;
    }

    function generarCodigoGitHub() {
        const code = document.getElementById('vistaPrevia').srcdoc;
        const out = document.getElementById('githubOutput');
        out.style.display = 'block';
        out.innerText = code;
    }

    function setDevice(t) { document.getElementById('vistaPrevia').className = (t==='mobile') ? 'mobile-view' : ''; }
</script>
</body>
</html>
