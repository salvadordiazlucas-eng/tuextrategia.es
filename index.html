<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TU ESTRATEGIA | Gestor IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --cobalto: #0072ff; --noche: #020617; --pizarra: #0f172a; --texto: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--noche); color: var(--texto); margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .container { text-align: center; width: 100%; max-width: 400px; padding: 20px; }
        h1 { font-weight: 300; letter-spacing: 6px; text-transform: uppercase; color: #94a3b8; margin-bottom: 5px; font-size: 1.5rem; }
        .domain { color: var(--cobalto); font-size: 12px; letter-spacing: 2px; margin-bottom: 40px; display: block; opacity: 0.7; }
        .login-box { background: var(--pizarra); padding: 40px 30px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .label-ident { display: block; font-size: 11px; color: var(--cobalto); letter-spacing: 2px; margin-bottom: 25px; text-transform: uppercase; font-weight: 700; }
        input { width: 100%; background: #1e293b; border: 1px solid #334155; color: white; padding: 15px; border-radius: 8px; font-size: 16px; text-align: center; box-sizing: border-box; margin-bottom: 20px; }
        .btn-access { width: 100%; background: var(--cobalto); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        .hidden-menu { display: none; }
        .tool-btn { display: block; background: #1e293b; color: white; text-decoration: none; padding: 20px; margin-top: 15px; border-radius: 8px; border: 1px solid #334155; text-align: left; }
        .tool-btn:hover { border-color: var(--cobalto); background: #26334d; }
    </style>
</head>
<body>
    <div class="container">
        <h1>TU ESTRATEGIA</h1>
        <span class="domain">GESTOR IA</span>
        <div id="auth-zone" class="login-box">
            <span class="label-ident">Identifícate</span>
            <input type="password" id="access-key" placeholder="••••••••">
            <button class="btn-access" onclick="verificar()">Entrar al Sistema</button>
        </div>
        <div id="tool-menu" class="hidden-menu">
            <div class="login-box">
                <span class="label-ident">Panel de Control</span>
                <a href="constructor.html" class="tool-btn">
                    <strong>🛠️ Constructor Maestro V3.2</strong>
                    <div style="font-size:11px; color:#94a3b8; margin-top:5px;">Maquetación web y edición de bloques.</div>
                </a>
                <a href="diagnostico.html" class="tool-btn">
                    <strong>🧠 Diagnóstico Estratégico</strong>
                    <div style="font-size:11px; color:#94a3b8; margin-top:5px;">Flujo de decisión y gestión de respuestas.</div>
                </a>
                <button onclick="location.reload()" style="background:none; border:none; color:#ef4444; font-size:11px; margin-top:25px; cursor:pointer; font-weight:700;">CERRAR SESIÓN</button>
            </div>
        </div>
    </div>
    <script>
        function verificar() {
            const key = document.getElementById('74Ab56dilu@').value;
            if(key === "74Ab56dilu@") { 
                document.getElementById('auth-zone').style.display = 'none';
                document.getElementById('tool-menu').style.display = 'block';
            } else { alert("Acceso denegado"); }
        }
        document.getElementById('access-key').addEventListener('keypress', (e) => { if (e.key === 'Enter') verificar(); });
    </script>
</body>
</html>
