<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TU ESTRATEGIA | GESTOR IA</title>
    <style>
        :root { --cobalto: #0072ff; --noche: #0a0a0b; --pizarra: #16161a; --texto: #f8fafc; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--noche); color: var(--texto); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        /* Barra de Navegación */
        .navbar { position: fixed; top: 0; width: 100%; background: var(--pizarra); padding: 15px; border-bottom: 1px solid #333; display: none; justify-content: center; gap: 30px; z-index: 100; }
        .navbar a { color: #888; text-decoration: none; font-size: 14px; font-weight: 600; transition: 0.3s; }
        .navbar a:hover, .navbar a.active { color: var(--cobalto); }

        /* Contenedores */
        .container { background-color: var(--pizarra); padding: 40px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.7); text-align: center; border: 1px solid #222; width: 100%; max-width: 400px; z-index: 10; }
        h1 { color: var(--cobalto); font-size: 22px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 30px; }
        
        /* Login */
        input { width: 100%; padding: 14px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--cobalto); }
        .btn-main { width: 100%; padding: 14px; border: none; border-radius: 8px; background: var(--cobalto); color: white; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,114,255,0.4); }
        
        /* Panel tras Login */
        .panel { display: none; }
        .btn-tool { display: block; padding: 18px; margin-bottom: 15px; border-radius: 10px; background: #222; color: #fff; text-decoration: none; border: 1px solid #333; transition: 0.3s; text-align: left; }
        .btn-tool:hover { background: #2a2a35; border-color: var(--cobalto); padding-left: 25px; }
        .btn-tool strong { display: block; color: var(--cobalto); font-size: 14px; }
        .btn-tool span { font-size: 12px; color: #777; }
        #error { color: #ff4b2b; font-size: 13px; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>

<nav class="navbar" id="top-nav">
    <a href="index.html" class="active">🏠 INICIO</a>
    <a href="constructor.html">🛠️ CONSTRUCTOR</a>
    <a href="diagnostico.html">📊 DIAGNÓSTICO</a>
</nav>

<div class="container" id="login-box">
    <h1>IDENTIFÍCATE</h1>
    <p id="error">Clave de acceso incorrecta</p>
    <input type="password" id="password" placeholder="Contraseña del sistema...">
    <button class="btn-main" onclick="checkAccess()">ENTRAR AL SISTEMA</button>
</div>

<div class="container panel" id="main-panel">
    <h1>CENTRO DE MANDO</h1>
    <div class="btn-group">
        <a href="constructor.html" class="btn-tool">
            <strong>🛠️ Constructor Maestro</strong>
            <span>Edición de bloques y maquetación web.</span>
        </a>
        <a href="diagnostico.html" class="btn-tool">
            <strong>📊 Diagnóstico Estratégico</strong>
            <span>Análisis sistémico y toma de decisiones.</span>
        </a>
    </div>
    <button onclick="location.reload()" style="background:transparent; border:none; color:#555; cursor:pointer; margin-top:20px; font-size:12px;">CERRAR SESIÓN</button>
</div>

<script>
    function checkAccess() {
        const key = document.getElementById('password').value;
        const error = document.getElementById('error');
        
        // Sustituye "TU_CLAVE" por la que elegiste
        if(key === "Salva2026") {
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('main-panel').style.display = 'block';
            document.getElementById('top-nav').style.display = 'flex';
        } else {
            error.style.display = 'block';
        }
    }
</script>

</body>
</html>
